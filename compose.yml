services:
  hyperion:
    image: "ghcr.io/hyperion-project/${distribution}:${codename}"
    platform: "${platform}"
    container_name: hyperion
    pull_policy: always
    environment:
      - DEBIAN_FRONTEND=noninteractive
    command: /bin/bash -c "apt-get update && apt-get install -y sudo gpg apt-transport-https lsb-release &&
      useradd --create-home --shell /bin/bash hyperion && chown hyperion:hyperion /home/hyperion &&
      curl -sSL https://github.com/Paulchen-Panther/hyperion.releases-ci/blob/main/install.sh | bash &&
      exec sudo -u hyperion /usr/bin/hyperiond -v --service"
    ports:
      - "19400:19400"
      - "19444:19444"
      - "19445:19445"
      - "8090:8090"
      - "8092:8092"
    volumes:
      - config:/home/hyperion:rw
    restart: unless-stopped
volumes:
  config: