services:
  hyperion:
    image: "ghcr.io/hyperion-project/${distribution}:${codename}"
    platform: "${platform}"
    container_name: hyperion
    pull_policy: always
    environment:
      - DEBIAN_FRONTEND=noninteractive
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        PACKAGE_MANAGER=$([[ "${distribution}" == 'debian' || "${distribution}" == 'ubuntu' ]] && echo "apt-get" || echo "dnf")
        $PACKAGE_MANAGER update && $PACKAGE_MANAGER install -y sudo lsb-release
        useradd --create-home --shell /bin/bash hyperion
        chown hyperion:hyperion /home/hyperion
        curl -sSL https://releases.hyperion-project.org/install | bash
        exec sudo -u hyperion /usr/bin/hyperiond -v --service
    ports:
      - "19400:19400"
      - "19444:19444"
      - "19445:19445"
      - "8090:8090"
      - "8092:8092"
    volumes:
      - config:/home/hyperion:rw
    restart: unless-stopped
volumes:
  config: