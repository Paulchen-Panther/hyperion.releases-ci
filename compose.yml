name: hyperion

services:
  hyperion:
    image: "ghcr.io/hyperion-project/${distribution}:${codename}"
    platform: "${platform}"
    pull_policy: always
    environment:
      - DEBIAN_FRONTEND=noninteractive
    command: bash -c "apt-get update && apt-get install -y wget gpg sudo dpkg apt-transport-https lsb-release &&
      useradd --create-home --shell /bin/bash hyperion &&
      wget -qO- https://releases.hyperion-project.org/hyperion.pub.key | sudo gpg --dearmor -o /usr/share/keyrings/hyperion.pub.gpg &&
      echo \"deb [arch=\$(dpkg --print-architecture) [signed-by=/usr/share/keyrings/hyperion.pub.gpg] https://apt.releases.hyperion-project.org/ \$(lsb_release -cs) main\" | sudo tee /etc/apt/sources.list.d/hyperion.list &&
      apt-get update && apt-get install -y hyperion &&
      sudo -u hyperion /usr/bin/hyperiond -v --service"
    ports:
      - "19400:19400"
      - "19444:19444"
      - "19445:19445"
      - "8090:8090"
      - "8092:8092"
    volumes:
      - config:/home/hyperion:rw
    restart: unless-stopped
volumes:
  config: